<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Animation Demo - Pure CSS Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #E0E7FF 0%, #F8FAFF 50%, #FFFFFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInUp 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #4f46e5;
      margin-bottom: 20px;
    }

    .badge-icon {
      width: 20px;
      height: 20px;
      background: #2E3192;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }

    h1 {
      font-size: 48px;
      color: #1a1a2e;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .description {
      font-size: 20px;
      color: #4a5568;
      line-height: 1.75;
      max-width: 800px;
      margin: 0 auto;
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .stage:hover {
      transform: scale(1.02);
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid #6366f1;
      animation: ringExpand 1s ease-out forwards;
      opacity: 0;
    }

    .ring-outer {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
      box-shadow: 0 0 60px rgba(99, 102, 241, 0.15);
      animation-delay: 0.2s;
    }

    .ring-middle {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
      animation-delay: 0.3s;
    }

    .ring-inner {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.25);
      animation-delay: 0.4s;
    }

    .logo-container {
      position: relative;
      z-index: 10;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 24px;
      box-shadow: 
        0 20px 60px rgba(99, 102, 241, 0.3),
        0 0 0 1px rgba(99, 102, 241, 0.1);
      padding: 20px;
      animation: logoAppear 0.8s ease-out 0.5s backwards, float 4s ease-in-out infinite;
    }

    .logo {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      font-weight: bold;
      filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.2));
    }

    .instruction {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(99, 102, 241, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      animation: pulse 2s ease-in-out infinite;
      white-space: nowrap;
    }

    .orbital-node {
      position: absolute;
      width: 80px;
      height: 80px;
      transform: translate(-50%, -50%);
      z-index: 5;
      opacity: 0;
      animation: nodePopIn 0.5s ease-out forwards, nodeFloat 3s ease-in-out infinite;
    }

    .orbital-node img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 
        0 8px 24px rgba(0, 0, 0, 0.12),
        0 0 0 3px rgba(255, 255, 255, 0.8),
        0 0 0 4px rgba(99, 102, 241, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .orbital-node:hover img {
      transform: scale(1.1);
      box-shadow: 
        0 12px 32px rgba(0, 0, 0, 0.18),
        0 0 0 3px rgba(255, 255, 255, 1),
        0 0 0 5px rgba(99, 102, 241, 0.4);
    }

    /* Node positions (8 nodes in circle) */
    .node-0 { left: calc(50% + 280px); top: 50%; animation-delay: 0.6s; }
    .node-1 { left: calc(50% + 198px); top: calc(50% - 198px); animation-delay: 0.7s; }
    .node-2 { left: 50%; top: calc(50% - 280px); animation-delay: 0.8s; }
    .node-3 { left: calc(50% - 198px); top: calc(50% - 198px); animation-delay: 0.9s; }
    .node-4 { left: calc(50% - 280px); top: 50%; animation-delay: 1.0s; }
    .node-5 { left: calc(50% - 198px); top: calc(50% + 198px); animation-delay: 1.1s; }
    .node-6 { left: 50%; top: calc(50% + 280px); animation-delay: 1.2s; }
    .node-7 { left: calc(50% + 198px); top: calc(50% + 198px); animation-delay: 1.3s; }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ringExpand {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 0.3;
      }
    }

    @keyframes logoAppear {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes nodePopIn {
      from {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes nodeFloat {
      0%, 100% {
        transform: translate(-50%, -50%) translateY(0);
      }
      50% {
        transform: translate(-50%, -50%) translateY(-8px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
      }
      50% {
        transform: translateX(-50%) scale(1.05);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 36px; }
      .description { font-size: 18px; }
      .stage { height: 400px; max-width: 500px; }
      .ring-outer { width: 450px; height: 450px; }
      .ring-middle { width: 320px; height: 320px; }
      .ring-inner { width: 220px; height: 220px; }
      .logo-container { width: 140px; height: 140px; }
      .orbital-node { width: 60px; height: 60px; }
      
      .node-0 { left: calc(50% + 200px); top: 50%; }
      .node-1 { left: calc(50% + 141px); top: calc(50% - 141px); }
      .node-2 { left: 50%; top: calc(50% - 200px); }
      .node-3 { left: calc(50% - 141px); top: calc(50% - 141px); }
      .node-4 { left: calc(50% - 200px); top: 50%; }
      .node-5 { left: calc(50% - 141px); top: calc(50% + 141px); }
      .node-6 { left: 50%; top: calc(50% + 200px); }
      .node-7 { left: calc(50% + 141px); top: calc(50% + 141px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">
        <div class="badge-icon">✦</div>
        <span>DATA IN ACTION</span>
      </div>
      <h1>Unlocking Value Across Use Cases</h1>
      <p class="description">
        See how businesses leverage web data to drive insights, optimize strategies, and stay ahead in competitive markets.
      </p>
    </div>

    <div class="stage" onclick="toggleNodes()">
      <div class="ring ring-outer"></div>
      <div class="ring ring-middle"></div>
      <div class="ring ring-inner"></div>

      <div class="logo-container">
        <div class="logo">D</div>
      </div>

      <div class="instruction">Click to reveal use cases</div>

      <!-- Orbital nodes (hidden by default) -->
      <div class="orbital-node node-0" style="display: none;">
        <img src="https://images.unsplash.com/photo-1556740758-90de374c12ad?w=100&h=100&fit=crop" alt="Use case 1">
      </div>
      <div class="orbital-node node-1" style="display: none;">
        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=100&h=100&fit=crop" alt="Use case 2">
      </div>
      <div class="orbital-node node-2" style="display: none;">
        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=100&h=100&fit=crop" alt="Use case 3">
      </div>
      <div class="orbital-node node-3" style="display: none;">
        <img src="https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=100&h=100&fit=crop" alt="Use case 4">
      </div>
      <div class="orbital-node node-4" style="display: none;">
        <img src="https://images.unsplash.com/photo-1551434678-e076c223a692?w=100&h=100&fit=crop" alt="Use case 5">
      </div>
      <div class="orbital-node node-5" style="display: none;">
        <img src="https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?w=100&h=100&fit=crop" alt="Use case 6">
      </div>
      <div class="orbital-node node-6" style="display: none;">
        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=100&h=100&fit=crop" alt="Use case 7">
      </div>
      <div class="orbital-node node-7" style="display: none;">
        <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?w=100&h=100&fit=crop" alt="Use case 8">
      </div>
    </div>
  </div>

  <script>
    let nodesVisible = false;

    function toggleNodes() {
      const nodes = document.querySelectorAll('.orbital-node');
      const instruction = document.querySelector('.instruction');
      
      nodesVisible = !nodesVisible;
      
      nodes.forEach(node => {
        node.style.display = nodesVisible ? 'block' : 'none';
      });

      instruction.textContent = nodesVisible ? 'Click to hide use cases' : 'Click to reveal use cases';
    }
  </script>
</body>
</html>
